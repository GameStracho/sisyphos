name: 📨 Release

on:
  push:
    branches: [main]

jobs:
  version:
    name: Bump Version
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

  build:
    name: Build SDK (${{ matrix.os }})
    needs: version
    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            configure_preset: release
            build_preset: release-build
            artifact_name: sisyphos-sdk-linux
            binary_dir: build/release
            vcpkg_triplet: x64-linux
          - os: windows-latest
            configure_preset: release-windows
            build_preset: release-windows-build
            artifact_name: sisyphos-sdk-windows
            binary_dir: build/release-windows
            vcpkg_triplet: x64-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ./third-party/vcpkg/bootstrap-vcpkg.bat -disableMetrics
          else
            ./third-party/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          fi

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: third-party/vcpkg_installed
          key: vcpkg-${{ matrix.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.os }}-

      - name: Configure
        run: cmake --preset ${{ matrix.configure_preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.build_preset }}

      - name: Package SDK (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p sdk/lib sdk/api
          cp ${{ matrix.binary_dir }}/src/editor/sisyphos_editor sdk/
          cp ${{ matrix.binary_dir }}/src/launcher/sisyphos_launcher sdk/
          cp third-party/vcpkg_installed/${{ matrix.vcpkg_triplet }}/lib/*.so* sdk/lib/ 2>/dev/null || true
          cp -r docs/api/. sdk/api/
          cd sdk && zip -r ../${{ matrix.artifact_name }}.zip .

      - name: Package SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force sdk, sdk/api | Out-Null
          Copy-Item ${{ matrix.binary_dir }}/src/editor/sisyphos_editor.exe sdk/
          Copy-Item ${{ matrix.binary_dir }}/src/launcher/sisyphos_launcher.exe sdk/
          Get-ChildItem third-party/vcpkg_installed/${{ matrix.vcpkg_triplet }}/bin/*.dll `
            -ErrorAction SilentlyContinue | Copy-Item -Destination sdk/
          if (Test-Path docs/api) { Copy-Item -Recurse docs/api/* sdk/api/ }
          Compress-Archive -Path sdk/* -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip

  release:
    name: Publish Release
    needs: [version, build]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          name: Release ${{ needs.version.outputs.new_tag }}
          body: ${{ needs.version.outputs.changelog }}
          files: artifacts/**/*.zip
