site_name: Sisyphos Game Engine
site_url: https://docs.sisyphos.dev
repo_url: https://github.com/GameStracho/sisyphos
repo_name: GameStracho/sisyphos
docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

nav:
  - Home: index.md
  - Internals:
      - Architecture: internals/architecture.md
      - Functional Requirements: internals/functional_requirements.md
      - Non-Functional Requirements: internals/non_functional_requirements.md
      - Structure: internals/structure.md
  - API: api/index.md
  - User Guide: user-guide/index.md
